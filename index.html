<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tower Remake - Settings Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap');
        
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Open Sans', sans-serif; user-select: none; touch-action: none; }
        
        /* Loading Screen Overlay */
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #111; z-index: 1000; display: flex;
            justify-content: center; align-items: center; overflow: hidden;
            transition: opacity 0.5s ease;
        }

        /* Customizable Panning Background Image */
        #loading-bg {
            position: absolute; top: 0; left: -10%; width: 120%; height: 100%;
            background-image: url('https://tr.rbxcdn.com/180DAY-30df204e4a0188e05ea2dcd225dab32d/768/432/Image/Webp/noFilter');
            background-size: cover; background-position: center; filter: blur(4px) brightness(0.6);
            animation: panBackground 8s ease-in-out infinite alternate; z-index: 1;
        }

        @keyframes panBackground {
            0% { transform: translateX(0); }
            100% { transform: translateX(-5%); }
        }

        #loading-container {
            position: relative; width: 500px; height: 320px; display: flex;
            flex-direction: column; align-items: center; z-index: 2;
        }

        #loading-icon-wrap {
            width: 180px; height: 180px; 
            display: flex; justify-content: center; align-items: center;
            z-index: 4; position: absolute; top: 50px; 
            transform: translateY(-50%); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        #loading-custom-square {
            width: 100%;
            height: 100%;
            background-image: url('https://www.speedrun.com/static/game/4d79o7n1/cover.png?v=6958f52'); 
            background-size: cover;
            background-position: center;
            border-radius: 24px; 
        }

        #loading-card {
            width: 100%; height: 200px; background: rgba(25, 25, 25, 0.85);
            border-radius: 16px; margin-top: 50px; z-index: 3;
            display: flex; flex-direction: column; justify-content: flex-end;
            align-items: center; padding-bottom: 30px; box-sizing: border-box;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #loading-title { color: #ffffff; font-size: 32px; font-weight: 700; margin: 0 0 4px 0; letter-spacing: 1px; }
        #loading-studio { color: #aaaaaa; font-size: 16px; font-weight: 400; margin: 0; }

        #loading-spinner {
            position: absolute; bottom: 40px; right: 40px; width: 45px; height: 45px;
            border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #ffffff;
            border-radius: 50%; animation: spin 1s linear infinite; z-index: 5;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Pause Button Logo Animation */
        @keyframes spinGrow {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(360deg) scale(1.2); }
        }
        @keyframes spinShrink {
            0% { transform: rotate(0deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        #roblox-menu-btn {
            position: absolute; top: 20px; left: 20px;
            width: 50px; height: 50px;
            background: rgb(0, 0, 0);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 50; pointer-events: auto;
        }
        #roblox-menu-btn svg { width: 36px; height: 36px; fill: #ffffff; }

        #pause-menu {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9); opacity: 0;
            width: 780px; height: 520px;
            background: rgba(25, 25, 25, 0.92);
            border-radius: 24px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            display: none; flex-direction: column;
            padding: 30px; box-sizing: border-box;
            z-index: 110; color: #fff;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.25s ease;
        }
        #pause-menu.open {
            display: flex; transform: translate(-50%, -50%) scale(1); opacity: 1;
        }

        .settings-workspace {
            display: flex; flex: 1; width: 100%; gap: 30px; overflow: hidden; margin-bottom: 20px;
        }
        
        .settings-sidebar {
            width: 220px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 15px;
        }
        .sidebar-heading {
            font-size: 18px; font-weight: 600; color: #ffffff; padding: 12px 10px; border-radius: 8px; cursor: pointer;
        }
        .sidebar-divider { height: 1px; background: rgba(25, 25, 25, 0.15); margin: 4px 0; }

        .settings-content { flex: 1; display: flex; flex-direction: column; gap: 20px; padding-top: 10px; overflow-y: auto; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 5px; }
        .setting-label { font-size: 14px; color: #cccccc; font-weight: 400; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .volume-control-wrap { display: flex; align-items: center; gap: 12px; }
        .volume-adjust-btn {
            width: 32px; height: 32px; border-radius: 50%; border: 2px solid #ffffff; background: transparent;
            color: #ffffff; font-size: 18px; font-weight: bold; cursor: pointer; display: flex;
            justify-content: center; align-items: center; line-height: 0; transition: transform 0.1s, opacity 0.2s;
        }
        .volume-adjust-btn:active { transform: scale(0.9); }
        .volume-bar-container { display: flex; gap: 4px; width: 180px; height: 16px; }
        .volume-segment { flex: 1; height: 100%; border-radius: 2px; transition: background-color 0.1s; cursor: pointer; }
        .segment-active { background-color: #ffffff; }
        .segment-inactive { background-color: #3d3d3d; }

        .menu-btn-container { display: flex; justify-content: space-between; width: 100%; gap: 15px; }
        .menu-row-btn {
            flex: 1; height: 54px; font-size: 16px; font-weight: bold; font-family: 'Open Sans', sans-serif;
            border: none; border-radius: 12px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            color: #fff; transition: background 0.2s;
        }
        .btn-dark-gray { background: #3a3a3a; }
        .btn-dark-gray:hover { background: #4a4a4a; }
        .btn-blue { background: #0077ff; }
        .btn-blue:hover { background: #0066dd; }
        
        .keycap {
            background: #222; border: 1px solid #555; border-radius: 6px;
            padding: 2px 8px; font-size: 11px; font-family: monospace;
            box-shadow: 0 2px 0 #111; color: #aaa; display: inline-block;
        }
        .desktop-shortcut { display: none; }

        .confirmation-panel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 15, 0.95);
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 120; color: white; text-align: center;
        }
        .confirmation-panel h3 { font-size: 28px; margin-bottom: 30px; max-width: 600px; line-height: 1.4; }
        .confirm-btn-box { display: flex; gap: 20px; }
        .confirm-btn {
            padding: 15px 40px; font-size: 20px; font-weight: bold; border-radius: 10px; cursor: pointer; box-sizing: border-box; font-family: 'Open Sans', sans-serif;
        }
        .btn-outline { background: transparent; border: 2px solid #ffffff; color: #ffffff; }
        .btn-outline:hover { background: rgba(255,255,255,0.1); }

        #damage-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.6); opacity: 0; pointer-events: none; z-index: 200;
            transition: opacity 0.1s ease-out;
        }

        #mobile-controls { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; display: none; }
        #joystick-container { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(40, 40, 40, 0.5); border: 2px solid #999; border-radius: 50%; pointer-events: auto; }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: #aaa; border-radius: 50%; transform: translate(-50%, -50%); }
        #jump-button { position: absolute; bottom: 40px; right: 40px; width: 120px; height: 120px; background: rgba(40, 40, 40, 0.5); border: 2px solid #999; border-radius: 50%; pointer-events: auto; display: flex; justify-content: center; align-items: center; transition: background 0.1s, border-color 0.1s; }
        #jump-button.active { background: rgba(0, 119, 255, 0.5); border-color: #0077ff; }
        #jump-button::after { content: ''; width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 25px solid #999; }
        #mobile-shiftlock { position: absolute; bottom: 180px; right: 65px; width: 70px; height: 70px; background: rgba(0, 0, 0, 0.5); border: 4px solid #ffffff; border-radius: 50%; pointer-events: auto; display: flex; justify-content: center; align-items: center; transition: border-color 0.1s, background-color 0.1s; }
        #mobile-shiftlock.active { border-color: #0077ff; background: rgba(0, 119, 255, 0.3); }
        .lock-icon { width: 24px; height: 28px; position: relative; }
        .lock-shackle { width: 16px; height: 16px; border: 3px solid #ffffff; border-bottom: none; border-radius: 8px 8px 0 0; position: absolute; top: 0; left: 1px; box-sizing: border-box; }
        #mobile-shiftlock.active .lock-shackle { border-color: #0077ff; }
        .lock-body { width: 24px; height: 16px; background: #ffffff; border-radius: 3px; position: absolute; bottom: 0; left: 0; }
        #mobile-shiftlock.active .lock-body { background: #0077ff; }

        #movement-mode-select, #graphics-mode-select {
            background: #3a3a3a; color: #fff; border: 1px solid #555; padding: 6px 12px;
            border-radius: 8px; font-family: 'Open Sans', sans-serif; font-size: 14px;
            outline: none; cursor: pointer; transition: background 0.1s;
        }
        #movement-mode-select:hover, #graphics-mode-select:hover { background: #4a4a4a; }
    </style>
</head>
<body>

    <div id="damage-flash"></div>

    <div id="loading-screen">
        <div id="loading-bg"></div>
        <div id="loading-container">
            <div id="loading-icon-wrap">
                <div id="loading-custom-square"></div>
            </div>
            <div id="loading-card">
                <h1 id="loading-title">Tower of Hell</h1>
                <p id="loading-studio">YXceptional Studios</p>
            </div>
        </div>
        <div id="loading-spinner"></div>
    </div>

    <div id="roblox-menu-btn">
        <svg viewBox="0 0 100 100">
            <rect x="25" y="25" width="50" height="50" transform="rotate(15 50 50)" />
            <rect x="41" y="41" width="18" height="18" fill="#000000" transform="rotate(15 50 50)" />
        </svg>
    </div>

    <div id="pause-menu">
        <div class="settings-workspace">
            <div class="settings-sidebar">
                <div id="heading-audio" class="sidebar-heading" style="background: rgba(255,255,255,0.1);">Audio</div>
                <div class="sidebar-divider"></div>
                <div id="heading-graphics" class="sidebar-heading" style="color:#777;">Display & Graphics</div>
                <div class="sidebar-divider"></div>
                <div id="heading-controls" class="sidebar-heading" style="color:#777;">View & Controls</div>
            </div>
            
            <div class="settings-content">
                <div id="section-audio">
                    <div class="setting-row">
                        <span class="setting-label">Volume</span>
                        <div class="volume-control-wrap">
                            <button id="vol-minus" class="volume-adjust-btn">-</button>
                            <div id="volume-bars" class="volume-bar-container"></div>
                            <button id="vol-plus" class="volume-adjust-btn">+</button>
                        </div>
                    </div>
                </div>

                <div id="section-graphics" style="display: none;">
                    <div class="setting-row">
                        <span class="setting-label">Graphics Mode</span>
                        <select id="graphics-mode-select">
                            <option value="auto">Auto</option>
                            <option value="manual">Manual</option>
                        </select>
                    </div>
                    <div class="setting-row" style="margin-top: 10px;">
                        <span class="setting-label">Graphics Quality</span>
                        <div class="volume-control-wrap">
                            <button id="gfx-minus" class="volume-adjust-btn">-</button>
                            <div id="graphics-bars" class="volume-bar-container"></div>
                            <button id="gfx-plus" class="volume-adjust-btn">+</button>
                        </div>
                    </div>
                </div>

                <div id="section-controls" style="display: none;">
                    <div class="setting-row">
                        <span class="setting-label">Camera Sensitivity</span>
                        <div class="volume-control-wrap">
                            <button id="cam-minus" class="volume-adjust-btn">-</button>
                            <div id="camera-bars" class="volume-bar-container"></div>
                            <button id="cam-plus" class="volume-adjust-btn">+</button>
                            <span id="cam-value-display" style="color: #ffffff; width: 30px; text-align: center;">1</span>
                        </div>
                    </div>

                    <div class="setting-row">
                        <span class="setting-label">Movement Mode</span>
                        <select id="movement-mode-select">
                            <!-- Options injected via JS based on device -->
                        </select>
                    </div>

                    <div class="setting-row">
                        <span class="setting-label">Shift Lock Switch</span>
                        <div id="shiftlock-toggle" class="btn-outline" style="cursor: pointer; padding: 6px 24px; font-size: 14px; font-weight: 400; border-radius: 8px; font-family: 'Open Sans', sans-serif;">On</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="menu-btn-container">
            <button id="menu-leave" class="menu-row-btn btn-dark-gray">
                Leave <span class="desktop-shortcut keycap">L</span>
            </button>
            <button id="menu-respawn" class="menu-row-btn btn-dark-gray">
                Respawn <span class="desktop-shortcut keycap">R</span>
            </button>
            <button id="menu-resume" class="menu-row-btn btn-blue">
                Resume <span class="desktop-shortcut keycap">Esc</span>
            </button>
        </div>
    </div>

    <div id="leave-confirmation-panel" class="confirmation-panel">
        <h3>Are you sure you want to leave the experience?</h3>
        <div class="confirm-btn-box">
            <button id="confirm-leave-yes" class="confirm-btn btn-blue">Leave</button>
            <button id="confirm-leave-no" class="confirm-btn btn-outline">Don't Leave</button>
        </div>
    </div>

    <div id="respawn-confirmation-panel" class="confirmation-panel">
        <h3>Are you sure you want to respawn your character?</h3>
        <div class="confirm-btn-box">
            <button id="confirm-respawn-yes" class="confirm-btn btn-blue">Respawn</button>
            <button id="confirm-respawn-no" class="confirm-btn btn-outline">Don't Respawn</button>
        </div>
    </div>

    <div id="mobile-controls">
        <div id="joystick-container"><div id="joystick-knob"></div></div>
        <div id="jump-button"></div>
        <div id="mobile-shiftlock">
            <div class="lock-icon">
                <div class="lock-shackle"></div>
                <div class="lock-body"></div>
            </div>
        </div>
    </div>

    <div id="dynamic-joystick-zone" style="position: absolute; bottom: 20px; left: 20px; width: 40%; height: 50%; border: 3px dashed rgba(255,255,255,0.4); background: rgba(255,255,255,0.02); border-radius: 20px; pointer-events: auto; display: none; box-sizing: border-box; z-index: 25;"></div>
    
    <div id="dynamic-joystick-container" style="position: absolute; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; display: none; pointer-events: none; transform: translate(-50%, -50%); z-index: 26;">
        <div id="dynamic-joystick-knob" style="position: absolute; width: 44px; height: 44px; background: rgba(255,255,255,0.85); border-radius: 50%; transform: translate(-50%, -50%);"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <script>
        const THEME = { head: 0xffdbac, torso: 0x3a86ff, skin: 0xffdbac, legs: 0x8338ec, gray: 0xcccccc, blue: 0x0077ff, glowOrange: 0xffa500 };
        let scene, camera, renderer, clock;
        let moveKeys = { w: false, a: false, s: false, d: false, space: false };
        let playerVel = new THREE.Vector3();
        let isShiftLock = false; 
        let isShiftLockEnabled = true; 
        let lastGroundedTime = 0;
        const COYOTE_DURATION = 0.2; 

        const NUM_SIDES = 20;
        const WALL_FACET_LENGTH = 21; 
        const STEP_WIDTH = 11;        
        const STEP_DEPTH = 21;        
        const OUTER_RADIUS = WALL_FACET_LENGTH / (2 * Math.sin(Math.PI / NUM_SIDES));
        const APOTHEM = WALL_FACET_LENGTH / (2 * Math.tan(Math.PI / NUM_SIDES));
        const HOLE_RADIUS = OUTER_RADIUS - 21;

        let playerPos = new THREE.Vector3(OUTER_RADIUS - 8, 6.5, 0); 
        let camYaw = 0, camPitch = 0, camDist = 25; 
        const FIRST_PERSON_DIST = 2.5; 
        let animTimer = 0, isRunning = false, isGrounded = true;
        let isMenuOpen = false;
        
        let charGroup, charMaterials = [], collisionObjs = [], ladderObjs = []; 
        let charHead, pL_Arm, pR_Arm, pL_Leg, pR_Leg, charTorso;
        
        let isRagdoll = false;
        let ragdollParts = [];

        let ambientLight, sun;

        let audioVolume = 8;
        let audioCtx = null;
        let currentMovementMode = 'keyboard';
        let currentGraphicsMode = 'auto';
        let graphicsQuality = 6;
        let cameraSensitivityBars = 5;
        let cameraSensitivityValue = 1;
        
        let dynamicTouchId = null;
        let dynamicStartPos = new THREE.Vector2();
        let trailCircles = [];
        let tapTargetPos = null;
        let tapMarkerMesh = null;

        const floorRay = new THREE.Raycaster();
        const ceilingRay = new THREE.Raycaster();
        const cameraRay = new THREE.Raycaster();
        const wallRay = new THREE.Raycaster();

        let joystickVector = new THREE.Vector2(0, 0);
        let joystickTouchId = null;
        let isRightMouseDown = false;
        
        let cameraTouches = []; 
        let initialPinchDist = null;
        let initialCamDist = null;

        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || navigator.maxTouchPoints > 0;
        
        let currentInputMode = 'pc';
        const isDesktopUA = /Win|Mac|Linux/i.test(navigator.userAgent);
        if (isMobile && !isDesktopUA) currentInputMode = 'mobile';
        if (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 0) currentInputMode = 'mobile';

        // Climbing State Variables
        let isCurrentlyClimbing = false;
        let currentClimbDir = new THREE.Vector3(0, 0, 1);
        let walkSoundTimer = 0.3;
        let climbSoundTimer = 0.4;

        function loadSettings() {
            const savedAudio = localStorage.getItem('toh_audio');
            if (savedAudio !== null) audioVolume = parseInt(savedAudio);
            const savedGfxMode = localStorage.getItem('toh_gfxMode');
            if (savedGfxMode !== null) currentGraphicsMode = savedGfxMode;
            const savedGfxQual = localStorage.getItem('toh_gfxQual');
            if (savedGfxQual !== null) graphicsQuality = parseInt(savedGfxQual);
            const savedSens = localStorage.getItem('toh_camSens');
            if (savedSens !== null) cameraSensitivityBars = parseInt(savedSens);
            const savedShiftLock = localStorage.getItem('toh_shiftLockEnabled');
            if (savedShiftLock !== null) isShiftLockEnabled = (savedShiftLock === 'true');
            const savedMoveMode = localStorage.getItem('toh_moveMode');
            if (savedMoveMode !== null) currentMovementMode = savedMoveMode;
        }

        function switchToPCControls() {
            if (currentInputMode === 'pc') return;
            currentInputMode = 'pc';
            document.getElementById('mobile-controls').style.display = 'none';
            joystickVector.set(0, 0);
            dynamicTouchId = null;
            joystickTouchId = null;
            trailCircles.forEach(c => c.style.display = 'none');
            populateMovementModeDropdown();
            updateMovementModeUI();
        }

        function switchToMobileControls() {
            if (currentInputMode === 'mobile') return;
            currentInputMode = 'mobile';
            document.getElementById('mobile-controls').style.display = 'block';
            moveKeys = { w: false, a: false, s: false, d: false, space: false };
            populateMovementModeDropdown();
            updateMovementModeUI();
        }

        function init() {
            loadSettings();
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x88ccff);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(50, 200, 50);
            scene.add(sun);

            buildTower();
            buildCharacter();
            setupMobileControls();
            setupMenuLogic();
            buildVolumeInterface();
            buildGraphicsInterface();
            buildCameraInterface();
            createTrailCircles();
            
            setTimeout(() => {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                checkPointerLockNeeds();
                const loader = document.getElementById('loading-screen');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
                if (currentInputMode === 'mobile') document.getElementById('mobile-controls').style.display = 'block';
                updateMovementModeUI();
                isRunning = true;
            }, 2000);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            document.addEventListener('pointerlockchange', () => {
                // Removed !isMobile check to allow pointer lock on touch laptops
                if (document.pointerLockElement !== renderer.domElement && isRunning && !isMenuOpen) {
                    if (isShiftLock || camDist <= FIRST_PERSON_DIST) openPauseMenu();
                }
            });

            window.addEventListener('keydown', (e) => { 
                if (isMobile && currentInputMode === 'mobile') {
                    switchToPCControls();
                    return; 
                }
                if (!isRunning && !isMenuOpen) return;
                const key = e.key.toLowerCase();
                if (e.key === 'Escape') {
                    e.preventDefault();
                    if (isMenuOpen) closePauseMenu(); else openPauseMenu();
                    return;
                }
                if (isMenuOpen) {
                    if (key === 'l') triggerLeaveSequence();
                    if (key === 'r') triggerRespawnSequence();
                    return;
                }
                if(key in moveKeys) moveKeys[key] = true; 
                if(e.code==='Space') moveKeys.space=true; 
                if(e.key === 'Shift') {
                    if (!isShiftLockEnabled) return;
                    isShiftLock = !isShiftLock;
                    const mobBtn = document.getElementById('mobile-shiftlock');
                    if (mobBtn) {
                        if (isShiftLock) mobBtn.classList.add('active');
                        else mobBtn.classList.remove('active');
                    }
                    checkPointerLockNeeds();
                }
            });

            window.addEventListener('keyup', (e) => { 
                const key = e.key.toLowerCase();
                if(key in moveKeys) moveKeys[key] = false; 
                if(e.code==='Space') moveKeys.space=false; 
            });

            window.addEventListener('mousedown', (e) => {
                if (e.button === 2) { isRightMouseDown = true; checkPointerLockNeeds(); }
            });
            window.addEventListener('mouseup', (e) => {
                if (e.button === 2) { isRightMouseDown = false; checkPointerLockNeeds(); }
            });
            window.addEventListener('contextmenu', e => e.preventDefault());

            document.addEventListener('mousemove', (e) => { 
                if (!isRunning || isMenuOpen) return;
                const hasLock = document.pointerLockElement === renderer.domElement;
                if (hasLock || isRightMouseDown) { 
                    const sens = 0.003 * cameraSensitivityValue;
                    camYaw -= e.movementX * sens; 
                    camPitch = THREE.MathUtils.clamp(camPitch + e.movementY * sens, -1.5, 1.5);
                } 
            });

            document.addEventListener('touchstart', (e) => {
                if (isMobile && currentInputMode === 'pc') {
                    const target = e.target;
                    if (!target.closest('#pause-menu') && !target.closest('#roblox-menu-btn') && !target.closest('.confirmation-panel') && !target.closest('#shiftlock-toggle')) {
                        switchToMobileControls();
                        return; 
                    }
                }
                if (!isRunning || isMenuOpen) return;
                const joyRect = document.getElementById('joystick-container').getBoundingClientRect();
                const jumpRect = document.getElementById('jump-button').getBoundingClientRect();
                const lockRect = document.getElementById('mobile-shiftlock').getBoundingClientRect();
                const topMenuRect = document.getElementById('roblox-menu-btn').getBoundingClientRect();
                const dZoneRect = document.getElementById('dynamic-joystick-zone').getBoundingClientRect();

                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    const isInsideJoystick = (currentMovementMode === 'classic' && t.clientX >= joyRect.left && t.clientX <= joyRect.right && t.clientY >= joyRect.top && t.clientY <= joyRect.bottom);
                    const isInsideDynamicZone = (currentMovementMode === 'dynamic' && t.clientX >= dZoneRect.left && t.clientX <= dZoneRect.right && t.clientY >= dZoneRect.top && t.clientY <= dZoneRect.bottom);
                    const isInsideJump = (t.clientX >= jumpRect.left && t.clientX <= jumpRect.right && t.clientY >= jumpRect.top && t.clientY <= jumpRect.bottom);
                    const isInsideLock = (t.clientX >= lockRect.left && t.clientX <= lockRect.right && t.clientY >= lockRect.top && t.clientY <= lockRect.bottom);
                    const isInsideTopMenu = (t.clientX >= topMenuRect.left && t.clientX <= topMenuRect.right && t.clientY >= topMenuRect.top && t.clientY <= topMenuRect.bottom);
                    if (isInsideJoystick || isInsideDynamicZone || isInsideJump || isInsideLock || isInsideTopMenu) continue; 
                    if (cameraTouches.length < 2) cameraTouches.push({ id: t.identifier, lastX: t.clientX, lastY: t.clientY });
                }
                if (cameraTouches.length === 2) {
                    let t1 = findCameraTouch(cameraTouches[0].id, e.touches);
                    let t2 = findCameraTouch(cameraTouches[1].id, e.touches);
                    if (t1 && t2) {
                        initialPinchDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                        initialCamDist = camDist;
                    }
                }
            }, { passive: false });

            document.addEventListener('touchmove', (e) => {
                if (!isRunning || isMenuOpen) return;
                if (cameraTouches.length === 2 && initialPinchDist !== null) {
                    let t1 = findCameraTouch(cameraTouches[0].id, e.touches);
                    let t2 = findCameraTouch(cameraTouches[1].id, e.touches);
                    if (t1 && t2) {
                        const currentDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                        const factor = initialPinchDist / currentDist;
                        const targetCamDist = initialCamDist * factor;
                        const diff = targetCamDist - initialCamDist;
                        camDist = THREE.MathUtils.clamp(initialCamDist + diff * 1.5, 0.1, 80);
                    }
                    return;
                }
                if (cameraTouches.length === 1) {
                    let t = findCameraTouch(cameraTouches[0].id, e.touches);
                    let cache = cameraTouches[0];
                    if (t) {
                        const sens = 0.006 * cameraSensitivityValue;
                        camYaw -= (t.clientX - cache.lastX) * sens;
                        camPitch = THREE.MathUtils.clamp(camPitch + (t.clientY - cache.lastY) * sens, -1.5, 1.5);
                        cache.lastX = t.clientX; cache.lastY = t.clientY;
                    }
                }
            }, { passive: false });

            const clearCameraTouches = (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const id = e.changedTouches[i].identifier;
                    cameraTouches = cameraTouches.filter(ct => ct.id !== id);
                }
                if (cameraTouches.length < 2) initialPinchDist = null;
            };
            document.addEventListener('touchend', clearCameraTouches);
            document.addEventListener('touchcancel', clearCameraTouches);

            window.addEventListener('wheel', (e) => {
                if(isRunning && !isMenuOpen) {
                    camDist = THREE.MathUtils.clamp(camDist + e.deltaY * 0.05, 0.1, 80);
                    checkPointerLockNeeds();
                }
            }, { passive: true });

            window.addEventListener('touchstart', (e) => {
                if (currentMovementMode !== 'tap' || isMenuOpen || isRagdoll || !isRunning) return;
                const target = e.target;
                if (target.closest('#roblox-menu-btn') || target.closest('#pause-menu') || target.closest('#jump-button') || target.closest('#mobile-shiftlock')) return;
                const touch = e.changedTouches[0];
                const mouse = new THREE.Vector2((touch.clientX / window.innerWidth) * 2 - 1, -(touch.clientY / window.innerHeight) * 2 + 1);
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(collisionObjs);
                if (intersects.length > 0) {
                    tapTargetPos = intersects[0].point.clone();
                    createTapMarker(tapTargetPos);
                }
            }, { passive: true });

            window.addEventListener('mousedown', (e) => {
                if (currentMovementMode !== 'tap' || isMenuOpen || isRagdoll || !isRunning || e.button !== 0) return;
                const target = e.target;
                if (target.closest('#roblox-menu-btn') || target.closest('#pause-menu')) return;
                const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(collisionObjs);
                if (intersects.length > 0) {
                    tapTargetPos = intersects[0].point.clone();
                    createTapMarker(tapTargetPos);
                }
            });

            clock = new THREE.Clock();
            loop();
        }

        function getAutoGraphicsLevel() {
            if (isMobile) return 3;
            const cores = navigator.hardwareConcurrency || 4;
            if (cores >= 8) return 8;
            if (cores >= 4) return 6;
            return 4;
        }

        function updateGraphicsVisuals() {
            const isAuto = (currentGraphicsMode === 'auto');
            const targetLevel = isAuto ? getAutoGraphicsLevel() : graphicsQuality;
            for(let i=1; i<=10; i++) {
                const el = document.getElementById(`gfx-seg-${i}`);
                if(el) {
                    if(!isAuto && i <= targetLevel) el.className = 'volume-segment segment-active';
                    else el.className = 'volume-segment segment-inactive';
                }
            }
            const minusBtn = document.getElementById('gfx-minus');
            const plusBtn = document.getElementById('gfx-plus');
            if (minusBtn && plusBtn) {
                if (isAuto) {
                    minusBtn.style.opacity = '0.25'; minusBtn.style.pointerEvents = 'none';
                    plusBtn.style.opacity = '0.25'; plusBtn.style.pointerEvents = 'none';
                } else {
                    minusBtn.style.opacity = '1'; minusBtn.style.pointerEvents = 'auto';
                    plusBtn.style.opacity = '1'; plusBtn.style.pointerEvents = 'auto';
                }
            }
            applyRenderGraphicsSettings(targetLevel);
        }

        function applyRenderGraphicsSettings(level) {
            if (!renderer || !sun || !ambientLight) return;
            if (level === 1) {
                sun.castShadow = false;
                renderer.shadowMap.type = THREE.PCFShadowMap;
                ambientLight.intensity = 0.8;
                sun.intensity = 1.0;
            } else {
                sun.castShadow = true;
                let shadowSize = 512;
                if (level >= 8) shadowSize = 2048;
                else if (level >= 5) shadowSize = 1024;
                sun.shadow.mapSize.width = shadowSize;
                sun.shadow.mapSize.height = shadowSize;
                const d = 150; 
                sun.shadow.camera.left = -d; sun.shadow.camera.right = d;
                sun.shadow.camera.top = d; sun.shadow.camera.bottom = -d;
                sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 500; 
                sun.shadow.bias = -0.0005;
                if (level >= 7) renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                else renderer.shadowMap.type = THREE.PCFShadowMap;
                ambientLight.intensity = THREE.MathUtils.lerp(0.8, 0.5, (level - 1) / 9);
                sun.intensity = THREE.MathUtils.lerp(1.0, 1.4, (level - 1) / 9);
            }
            scene.traverse((object) => {
                if (object.isMesh) {
                    if (level > 1) { object.castShadow = true; object.receiveShadow = true; }
                    else { object.castShadow = false; object.receiveShadow = false; }
                    if (object.material) object.material.needsUpdate = true;
                }
            });
            renderer.shadowMap.needsUpdate = true;
        }

        function buildCameraInterface() {
            const container = document.getElementById('camera-bars');
            container.innerHTML = '';
            for(let i=1; i<=10; i++) {
                const el = document.createElement('div');
                el.className = 'volume-segment';
                el.id = `cam-seg-${i}`;

        function updateCameraSensitivityValue() {
            if (cameraSensitivityBars === 5) cameraSensitivityValue = 1;
            else if (cameraSensitivityBars < 5) cameraSensitivityValue = 1 - (5 - cameraSensitivityBars) * 0.16;
            else cameraSensitivityValue = 1 + (cameraSensitivityBars - 5) * 0.6;
            cameraSensitivityValue = Math.round(cameraSensitivityValue * 100) / 100;
            const display = document.getElementById('cam-value-display');
            if (display) display.innerText = cameraSensitivityValue;
            for(let i=1; i<=10; i++) {
                const el = document.getElementById(`cam-seg-${i}`);
                if(el) {
                    if(i <= cameraSensitivityBars) el.className = 'volume-segment segment-active';
                    else el.className = 'volume-segment segment-inactive';
                }
            }
        }

        function playOofSound() {
            if (!audioCtx || audioVolume <= 0) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'triangle';
            const t = audioCtx.currentTime;
            osc.frequency.setValueAtTime(140, t);
            osc.frequency.linearRampToValueAtTime(280, t + 0.12);
            const vol = (audioVolume / 10) * 0.4;
            gainNode.gain.setValueAtTime(vol, t);
            gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start(t);
            osc.stop(t + 0.36);
        }

        function playWalkSound() {
            if (!audioCtx || audioVolume <= 0) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'square';
            const t = audioCtx.currentTime;
            osc.frequency.setValueAtTime(120, t);
            osc.frequency.exponentialRampToValueAtTime(60, t + 0.08);
            const vol = (audioVolume / 10) * 0.2;
            gainNode.gain.setValueAtTime(vol, t);
            gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start(t);
            osc.stop(t + 0.1);
        }

        function playJumpSound() {
            if (!audioCtx || audioVolume <= 0) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            const t = audioCtx.currentTime;
            osc.frequency.setValueAtTime(300, t);
            osc.frequency.exponentialRampToValueAtTime(600, t + 0.15);
            const vol = (audioVolume / 10) * 0.3;
            gainNode.gain.setValueAtTime(vol, t);
            gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start(t);
            osc.stop(t + 0.2);
        }

        function playClimbSound() {
            if (!audioCtx || audioVolume <= 0) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'triangle';
            const t = audioCtx.currentTime;

        }

        function setupMenuLogic() {
            if(!isMobile) document.querySelectorAll('.desktop-shortcut').forEach(el => el.style.display = 'inline-block');
            populateMovementModeDropdown();
            document.getElementById('shiftlock-toggle').innerText = isShiftLockEnabled ? 'On' : 'Off';

                if (isMenuOpen) closePauseMenu(); else openPauseMenu();
            });

            document.getElementById('menu-resume').addEventListener('click', closePauseMenu);
            document.getElementById('menu-respawn').addEventListener('click', triggerRespawnSequence);
            document.getElementById('menu-leave').addEventListener('click', triggerLeaveSequence);

            });

            });

                if(cameraSensitivityBars > 0) { cameraSensitivityBars--; updateCameraSensitivityValue(); localStorage.setItem('toh_camSens', cameraSensitivityBars); }
            });

        function openPauseMenu() {
            if (isRagdoll || !isRunning) return;
            isMenuOpen = true;
            const menu = document.getElementById('pause-menu');
            menu.style.display = 'flex';
            setTimeout(() => menu.classList.add('open'), 10);
            if(document.pointerLockElement === renderer.domElement) document.exitPointerLock();
            Object.keys(moveKeys).forEach(k => moveKeys[k] = false);
            joystickVector.set(0, 0);
            updateGraphicsVisuals();
            animateMenuButton(true);
        }

        function closePauseMenu() {
            isMenuOpen = false;
            const menu = document.getElementById('pause-menu');
            menu.classList.remove('open');
            document.getElementById('leave-confirmation-panel').style.display = 'none';
            document.getElementById('respawn-confirmation-panel').style.display = 'none';

        function triggerLeaveSequence() {
            document.getElementById('pause-menu').classList.remove('open');

                document.getElementById('pause-menu').style.display = 'none';
                document.getElementById('leave-confirmation-panel').style.display = 'flex';

        function triggerRespawnSequence() {

        function executeRagdollRespawn() {
            closePauseMenu();
            if (isRagdoll) return;
            isRagdoll = true;
            playOofSound();
            const df = document.getElementById('damage-flash');
            df.style.opacity = '1';
            setTimeout(() => { df.style.opacity = '0'; }, 200);

            const partsToBreak = [
                { obj: charHead, offset: new THREE.Vector3(0, 4.75, 0) },
                { obj: charTorso, offset: new THREE.Vector3(0, 3, 0) },
                { obj: pL_Arm, offset: new THREE.Vector3(-1.55, 3.5, 0) },
                { obj: pR_Arm, offset: new THREE.Vector3(1.55, 3.5, 0) },
                { obj: pL_Leg, offset: new THREE.Vector3(-0.55, 2, 0) },
                { obj: pR_Leg, offset: new THREE.Vector3(0.55, 2, 0) }
            ];

            ragdollParts = [];
            partsToBreak.forEach(item => {
                const worldPos = new THREE.Vector3();
                item.obj.getWorldPosition(worldPos);
                scene.attach(item.obj);
                ragdollParts.push({
                    mesh: item.obj, pos: worldPos,
                    vel: new THREE.Vector3((Math.random() - 0.5) * 15, Math.random() * 20 + 15, (Math.random() - 0.5) * 15),
                    rotVel: new THREE.Vector3((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10)
                });
            });

            setTimeout(() => {
                charGroup.add(charHead); charHead.position.set(0, 4.75, 0); charHead.rotation.set(0,0,0);
                charGroup.add(charTorso); charTorso.position.set(0, 3, 0); charTorso.rotation.set(0,0,0);
                charGroup.add(pL_Arm); pL_Arm.position.set(-1.55, 3.5, 0); pL_Arm.rotation.set(0,0,0);
                charGroup.add(pR_Arm); pR_Arm.position.set(1.55, 3.5, 0); pR_Arm.rotation.set(0,0,0);
                charGroup.add(pL_Leg); pL_Leg.position.set(-0.55, 2, 0); pL_Leg.rotation.set(0,0,0);
                charGroup.add(pR_Leg); pR_Leg.position.set(0.55, 2, 0); pR_Leg.rotation.set(0,0,0);
                playerPos.set(OUTER_RADIUS - 8, 6.5, 0);
                playerVel.set(0, 0, 0); camYaw = 0; camPitch = 0;
                isRagdoll = false;
                const currentLevel = (currentGraphicsMode === 'auto') ? getAutoGraphicsLevel() : graphicsQuality;
                applyRenderGraphicsSettings(currentLevel);
            }, 3000);
        }

        function findCameraTouch(id, touchList) {
            for (let i = 0; i < touchList.length; i++) {
                if (touchList[i].identifier === id) return touchList[i];
            }
            return null;
        }

        function checkPointerLockNeeds() {
            // Removed isMobile check to fix touch screen laptops
            if (isMenuOpen || isRagdoll || !isRunning) return;
            const isFirstPerson = camDist <= FIRST_PERSON_DIST;
            if (isShiftLock || isFirstPerson) {
                if (document.pointerLockElement !== renderer.domElement) renderer.domElement.requestPointerLock();
            } else if (!isRightMouseDown && document.pointerLockElement === renderer.domElement) {
                document.exitPointerLock();
            }
        }

            for (let i = 0; i < 5; i++) {
                const circle = document.createElement('div');
                circle.style.position = 'absolute';
                circle.style.width = '12px'; circle.style.height = '12px';
                circle.style.background = 'rgba(255, 255, 255, 0.6)';
                circle.style.borderRadius = '50%'; circle.style.pointerEvents = 'none';
                circle.style.display = 'none'; circle.style.zIndex = '27';
                circle.style.transform = 'translate(-50%, -50%)';
                document.body.appendChild(circle);
                trailCircles.push(circle);
            }

            const handleJoystick = (e) => {
                e.preventDefault();
                if (currentMovementMode !== 'classic' || isMenuOpen || isRagdoll || !isRunning) return;
                if (joystickTouchId === null && e.type === 'touchstart') joystickTouchId = e.changedTouches[0].identifier;
                let touch = null;
                for (let i = 0; i < e.touches.length; i++) {
                    if (e.touches[i].identifier === joystickTouchId) touch = e.touches[i];
                }
                if (!touch) return;
                const rect = joystick.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const maxLen = rect.width / 2;
                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > maxLen) { dx *= maxLen / dist; dy *= maxLen / dist; }
                knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                joystickVector.set(dx / maxLen, dy / maxLen);

            joystick.addEventListener('touchstart', handleJoystick);

                }
                if (!touch) return;
                let dx = touch.clientX - dynamicStartPos.x;
                let dy = touch.clientY - dynamicStartPos.y;

                const dist = Math.sqrt(dx*dx + dy*dy);

        function hasWallCollision(pos, dir, objs) {
            const yLevels = [pos.y - 1.5, pos.y - 3.5, pos.y - 5.4]; 
            const xOffset = dir.z * 0.5;
            const zOffset = dir.x * 0.5;
            const origins = [
                new THREE.Vector3(pos.x, 0, pos.z),
                new THREE.Vector3(pos.x + xOffset, 0, pos.z + zOffset),
                new THREE.Vector3(pos.x - xOffset, 0, pos.z - zOffset)
            ];
            for (let y of yLevels) {
                for (let origin of origins) {
                    wallRay.set(new THREE.Vector3(origin.x, y, origin.z), dir);
                    wallRay.far = 0.8;
                    if (wallRay.intersectObjects(objs).length > 0) return true;
                }
            }
            return false;
        }

        function tryStepUp(pPos, moveDir, objs) {
            const feetY = pPos.y - 5.5;
            const rayOriginFeet = new THREE.Vector3(pPos.x, feetY + 0.1, pPos.z);
            const perp = new THREE.Vector3(-moveDir.z, 0, moveDir.x).multiplyScalar(0.5);
            const origins = [
                rayOriginFeet.clone(),
                rayOriginFeet.clone().add(perp),
                rayOriginFeet.clone().sub(perp)
            ];
            let highestStep = null;
            for (let origin of origins) {
                wallRay.set(origin, moveDir);
                wallRay.far = 1.5; 
                const hits = wallRay.intersectObjects(objs);
                if (hits.length > 0) {
                    const hitObj = hits[0].object;
                    const bb = new THREE.Box3().setFromObject(hitObj);
                    const topY = bb.max.y;
                    const stepHeight = topY - feetY;
                    if (stepHeight > -0.1 && stepHeight <= 2.1) {
                        const clearRayOrigin = new THREE.Vector3(pPos.x, feetY + 2.2, pPos.z);
                        wallRay.set(clearRayOrigin, moveDir);
                        wallRay.far = 1.5;
                        const clearHits = wallRay.intersectObjects(objs);
                        if (clearHits.length === 0) {
                            if (highestStep === null || topY > highestStep) highestStep = topY;
                        }
                    }
                }
            }
            if (highestStep !== null) return highestStep + 5.5;
            return null;
        }

        function loop() {
            requestAnimationFrame(loop);
            const dt = Math.min(clock.getDelta(), 0.1);
            const now = clock.getElapsedTime();
            
            if (isRagdoll) {
                ragdollParts.forEach(part => {
                    part.vel.y -= 150 * dt;
                    part.pos.addScaledVector(part.vel, dt);
                    part.mesh.position.copy(part.pos);
                    part.mesh.rotation.x += part.rotVel.x * dt;
                    part.mesh.rotation.y += part.rotVel.y * dt;
                    part.mesh.rotation.z += part.rotVel.z * dt;
                    if (part.pos.y < 1.0) {
                        part.pos.y = 1.0;
                        part.vel.set(0,0,0);
                        part.rotVel.set(0,0,0);
                    }
                });
                if (ragdollParts.length > 0) {
                    const focusTarget = ragdollParts[1].pos; 
                    camera.lookAt(focusTarget);
                }
            }
            
            if(isRunning && !isMenuOpen && !isRagdoll) {
                let d = new THREE.Vector3();
                if(moveKeys.w) d.z -= 1; if(moveKeys.s) d.z += 1;
                if(moveKeys.a) d.x -= 1; if(moveKeys.d) d.x += 1;
                if (joystickVector.length() > 0) { d.x = joystickVector.x; d.z = joystickVector.y; }
                if (d.length() > 0) d.normalize();

                if (moveKeys.w || moveKeys.s || moveKeys.a || moveKeys.d || joystickVector.length() > 0) tapTargetPos = null;

                if ((currentMovementMode === 'tap' || currentMovementMode === 'click') && tapTargetPos) {
                    const diffX = tapTargetPos.x - playerPos.x;
                    const diffZ = tapTargetPos.z - playerPos.z;
                    const dist2D = Math.sqrt(diffX * diffX + diffZ * diffZ);
                    if (dist2D > 0.5) {
                        const worldDir = new THREE.Vector3(diffX, 0, diffZ).normalize();
                        const localDir = worldDir.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), -camYaw);
                        d.x = localDir.x;
                        d.z = localDir.z;
                    } else {
                        tapTargetPos = null;
                    }
                }

                const isFirstPerson = camDist <= FIRST_PERSON_DIST;
                let moveDir = d.clone().applyAxisAngle(new THREE.Vector3(0,1,0), camYaw).normalize();
                let moveDelta = moveDir.clone().multiplyScalar(16 * dt);

                let climbTopY = 0;
                let isWalking = false;

                if (isCurrentlyClimbing) {
                    let stillClimbing = false;
                    const yLevels = [playerPos.y - 1.5, playerPos.y - 3.0, playerPos.y - 4.5];
                    for (let y of yLevels) {
                        const origin = new THREE.Vector3(playerPos.x, y, playerPos.z);
                        wallRay.set(origin, currentClimbDir);
                        wallRay.far = 1.2;
                        const hits = wallRay.intersectObjects(collisionObjs);
                        if (hits.length > 0) {
                            const hitObj = hits[0].object;
                            const bb = new THREE.Box3().setFromObject(hitObj);
                            const topY = bb.max.y;
                            const size = new THREE.Vector3(); bb.getSize(size);
                            const minDim = Math.min(size.x, size.y, size.z);
                            let isClimbable = ladderObjs.includes(hitObj);
                            if (minDim >= 0.1 && minDim <= 2.1) isClimbable = true;
                            if (isClimbable && playerPos.y - 5.5 < topY - 0.1) {
                                stillClimbing = true;
                                climbTopY = topY;
                                break;
                            }
                        }
                    }
                    isCurrentlyClimbing = stillClimbing;
                    
                    if (isCurrentlyClimbing) {
                        if (playerPos.y - 5.5 >= climbTopY - 0.5) {
                            playerPos.y = climbTopY + 5.5;
                            if (moveKeys.w || moveKeys.a || moveKeys.d || moveKeys.s || joystickVector.length() > 0) {
                                playerPos.x += moveDelta.x;
                                playerPos.z += moveDelta.z;
                            }
                            isCurrentlyClimbing = false;
                            isWalking = true;
                        } else {
                            playerVel.set(0, 0, 0);
                            let upDir = 1;
                            if (camPitch < -0.5) upDir = -1;
                            
                            let climbDelta = 0;
                            if (moveKeys.w || moveKeys.a || moveKeys.d) climbDelta += 11.2 * dt * upDir;
                            if (moveKeys.s) climbDelta -= 11.2 * dt * upDir;
                            if (joystickVector.y < -0.5) climbDelta += 11.2 * dt * upDir;
                            if (joystickVector.y > 0.5) climbDelta -= 11.2 * dt * upDir;
                            
                            if (climbDelta > 0) {
                                ceilingRay.set(new THREE.Vector3(playerPos.x, playerPos.y - 0.2, playerPos.z), new THREE.Vector3(0, 1, 0));
                                const cHHits = ceilingRay.intersectObjects(collisionObjs);
                                if (cHHits.length > 0 && cHHits[0].distance < 0.9) climbDelta = 0;
                            }
                            
                            if (climbDelta !== 0) {
                                animTimer += dt * 6;
                                climbSoundTimer += dt;
                                if (climbSoundTimer > 0.4) {
                                    playClimbSound();
                                    climbSoundTimer = 0;
                                }
                            }
                            
                            playerPos.y += climbDelta;
                            isGrounded = false; lastGroundedTime = now;
                            moveDelta.set(0, 0, 0);
                        }
                    } else {
                        playerVel.y -= 196.2 * dt;
                    }
                } else {
                    const climbCheckDir = moveDir.length() > 0 ? moveDir : new THREE.Vector3(0,0,1).applyAxisAngle(new THREE.Vector3(0,1,0), camYaw);
                    const yLevels = [playerPos.y - 1.5, playerPos.y - 3.0, playerPos.y - 4.5];
                    for (let y of yLevels) {
                        const origin = new THREE.Vector3(playerPos.x, y, playerPos.z);
                        wallRay.set(origin, climbCheckDir);
                        wallRay.far = 1.2;
                        const hits = wallRay.intersectObjects(collisionObjs);
                        if (hits.length > 0) {
                            const hitObj = hits[0].object;
                            const bb = new THREE.Box3().setFromObject(hitObj);
                            const topY = bb.max.y;
                            const size = new THREE.Vector3(); bb.getSize(size);
                            const minDim = Math.min(size.x, size.y, size.z);
                            let isClimbable = ladderObjs.includes(hitObj);
                            if (minDim >= 0.1 && minDim <= 2.1) isClimbable = true;
                            if (isClimbable && playerPos.y - 5.5 < topY - 0.1) {
                                const originStep = new THREE.Vector3(playerPos.x, playerPos.y - 3.3, playerPos.z);
                                wallRay.set(originStep, climbCheckDir);
                                wallRay.far = 1.2;
                                const hitsStep = wallRay.intersectObjects(collisionObjs);
                                if (hitsStep.length > 0) {
                                    isCurrentlyClimbing = true;
                                    currentClimbDir.copy(climbCheckDir);
                                    break;
                                }
                            }
                        }
                    }
                    
                    if (!isCurrentlyClimbing) {
                        playerVel.y -= 196.2 * dt;
                        if (moveDelta.x !== 0) {
                            let dirX = new THREE.Vector3(Math.sign(moveDelta.x), 0, 0);
                            if (!hasWallCollision(new THREE.Vector3(playerPos.x + moveDelta.x, playerPos.y, playerPos.z), dirX, collisionObjs)) {
                                playerPos.x += moveDelta.x; isWalking = true;
                            } else {
                                let stepY = tryStepUp(playerPos, dirX, collisionObjs);
                                if (stepY !== null) { playerPos.y = stepY; playerPos.x += moveDelta.x; isWalking = true; }
                            }
                        }
                        if (moveDelta.z !== 0) {
                            let dirZ = new THREE.Vector3(0, 0, Math.sign(moveDelta.z));
                            if (!hasWallCollision(new THREE.Vector3(playerPos.x, playerPos.y, playerPos.z + moveDelta.z), dirZ, collisionObjs)) {
                                playerPos.z += moveDelta.z; isWalking = true;
                            } else {
                                let stepY = tryStepUp(playerPos, dirZ, collisionObjs);
                                if (stepY !== null) { playerPos.y = stepY; playerPos.z += moveDelta.z; isWalking = true; }
                            }
                        }
                        if (isWalking) {
                            walkSoundTimer += dt;
                            if (walkSoundTimer > 0.3) {
                                playWalkSound();
                                walkSoundTimer = 0;
                            }
                            if (isShiftLock || isFirstPerson) { charGroup.rotation.y = camYaw + Math.PI; } 
                            else {
                                let targetRot = Math.atan2(moveDir.x, moveDir.z); 
                                let angleDiff = targetRot - charGroup.rotation.y;
                                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                                charGroup.rotation.y += angleDiff * 0.15;
                            }
                        } else {
                            walkSoundTimer = 0.3;
                            if (isShiftLock || isFirstPerson) charGroup.rotation.y = camYaw + Math.PI;
                        }
                    }
                }

                // --- Animation Update ---
                if (isCurrentlyClimbing) {
                    charGroup.rotation.y = Math.atan2(currentClimbDir.x, currentClimbDir.z);
                    charTorso.position.z = -0.5// Moved back 1 stud to original position
                    charHead.position.z = -0.5; 
                    charHead.rotation.x = -15 * (Math.PI / 180); 
                    pL_Arm.rotation.x = -Math.PI / 2 + Math.sin(animTimer) * (Math.PI / 4); 
                    pR_Arm.rotation.x = -Math.PI / 2 - Math.sin(animTimer) * (Math.PI / 4);
                    pL_Arm.rotation.z = 5 * (Math.PI / 180);
                    pR_Arm.rotation.z = -5 * (Math.PI / 180);
                    pL_Leg.position.x = -0.65; 
                    pR_Leg.position.x = 0.65;  
                    let legVal = Math.sin(animTimer);
                    let rightLegVal = Math.sin(animTimer + Math.PI);
                    if (legVal > 0) {
                        pL_Leg.rotation.x = -15 * legVal * (Math.PI / 180); 
                        pL_Leg.position.y = 2 + legVal * 1; 
                        pL_Leg.position.z = -legVal * 1;   
                    } else {
                        pL_Leg.rotation.x = 5 * -legVal * (Math.PI / 180); 
                        pL_Leg.position.y = 2;
                        pL_Leg.position.z = 0;
                    }
                    if (rightLegVal > 0) {
                        pR_Leg.rotation.x = -15 * rightLegVal * (Math.PI / 180);
                        pR_Leg.position.y = 2 + rightLegVal * 1;
                        pR_Leg.position.z = -rightLegVal * 1;
                    } else {
                        pR_Leg.rotation.x = 5 * -rightLegVal * (Math.PI / 180);
                        pR_Leg.position.y = 2;
                        pR_Leg.position.z = 0;
                    }
                } else {
                    charTorso.position.z = 0;
                    charHead.position.z = 0; 
                    charHead.rotation.x = 0;
                    pL_Arm.rotation.z = 0;
                    pR_Arm.rotation.z = 0;
                    pL_Leg.position.x = -0.55;
                    pR_Leg.position.x = 0.55;
                    if (playerVel.y > 0 || !isGrounded) {
                        pL_Arm.rotation.x += (-Math.PI * 0.75 - pL_Arm.rotation.x) * 0.2; pR_Arm.rotation.x += (-Math.PI * 0.75 - pR_Arm.rotation.x) * 0.2;
                        pL_Leg.rotation.x += (0.087 - pL_Leg.rotation.x) * 0.2; pR_Leg.rotation.x += (0.087 - pR_Leg.rotation.x) * 0.2;
                        pL_Leg.position.y = 2; pL_Leg.position.z = 0;
                        pR_Leg.position.y = 2; pR_Leg.position.z = 0;
                        charTorso.rotation.y = 0;
                    } else if (isWalking) {
                        animTimer += dt * 14; const sw = Math.sin(animTimer);
                        pL_Arm.rotation.x = sw * 0.78; pR_Arm.rotation.x = -sw * 0.78;
                        pL_Leg.rotation.x = -sw * 0.78; pR_Leg.rotation.x = sw * 0.78;
                        pL_Leg.position.y = 2; pL_Leg.position.z = 0;
                        pR_Leg.position.y = 2; pR_Leg.position.z = 0;
                        // Torso twist: 2 degrees clockwise when left arm forward (sw > 0)
                        charTorso.rotation.y = -sw * (2 * Math.PI / 180);
                    } else {
                        pL_Arm.rotation.x *= 0.85; pR_Arm.rotation.x *= 0.85; pL_Leg.rotation.x *= 0.85; pR_Leg.rotation.x *= 0.85;
                        pL_Leg.position.y = 2; pL_Leg.position.z = 0;
                        pR_Leg.position.y = 2; pR_Leg.position.z = 0;
                        charTorso.rotation.y = 0;
                    }
                }

                // --- Jump Logic ---
                if (moveKeys.space) {
                    if (isCurrentlyClimbing) {
                        playerVel.y = 62.6;
                        const backDir = currentClimbDir.clone().negate();
                        playerPos.x += backDir.x * 2.0;
                        playerPos.z += backDir.z * 2.0;
                        playerVel.x = backDir.x * 25;
                        playerVel.z = backDir.z * 25;
                        isCurrentlyClimbing = false;
                        lastGroundedTime = 0;
                        playJumpSound();
                    } else if (now - lastGroundedTime < COYOTE_DURATION) {
                        playerVel.y = 62.6;
                        isGrounded = false;
                        lastGroundedTime = 0;
                        playJumpSound();
                    }
                }

                playerPos.y += playerVel.y * dt;

                if (playerVel.y > 0) {
                    ceilingRay.set(new THREE.Vector3(playerPos.x, playerPos.y - 0.2, playerPos.z), new THREE.Vector3(0, 1, 0));
                    const cHHits = ceilingRay.intersectObjects(collisionObjs);
                    if (cHHits.length > 0 && cHHits[0].distance < 0.9) playerVel.y = 0;
                }

                if(!isCurrentlyClimbing) {
                    isGrounded = false;
                    floorRay.set(new THREE.Vector3(playerPos.x, playerPos.y - 2, playerPos.z), new THREE.Vector3(0,-1,0));
                    const fHits = floorRay.intersectObjects(collisionObjs);
                    if(playerVel.y <= 0) {
                        if (fHits.length > 0 && fHits[0].distance < 4.0) {
                            playerPos.y = fHits[0].point.y + 5.5; playerVel.y = 0; isGrounded = true; lastGroundedTime = now;
                        } else if (playerPos.y <= 6.5) {
                            playerPos.y = 6.5; playerVel.y = 0; isGrounded = true; lastGroundedTime = now;
                        }
                    }
                }

                charGroup.position.set(playerPos.x, playerPos.y - 5.5, playerPos.z);
                const headWorldPos = new THREE.Vector3(); charHead.getWorldPosition(headWorldPos);
                let camOffset = (isShiftLock && !isFirstPerson) ? new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), camYaw).multiplyScalar(1.75) : new THREE.Vector3();
                const ideal = new THREE.Vector3(headWorldPos.x + camOffset.x + Math.sin(camYaw)*Math.cos(camPitch)*camDist, headWorldPos.y + camOffset.y + Math.sin(camPitch)*camDist, headWorldPos.z + camOffset.z + Math.cos(camYaw)*Math.cos(camPitch)*camDist);
                cameraRay.set(headWorldPos, ideal.clone().sub(headWorldPos).normalize());
                const wallHits = cameraRay.intersectObjects(collisionObjs);
                camera.position.copy((wallHits.length > 0 && wallHits[0].distance < camDist) ? wallHits[0].point.add(cameraRay.ray.direction.clone().multiplyScalar(-1.2)) : ideal);
                camera.lookAt(headWorldPos.clone().add(camOffset));
                
                let op = THREE.MathUtils.clamp((headWorldPos.distanceTo(camera.position) - 2) / 3, 0, 1);
                if (headWorldPos.distanceTo(camera.position) < 1.0) op = 0; 
                charMaterials.forEach(m => { m.opacity = op; m.transparent = (op < 1); m.needsUpdate = true; });
            }

            if (tapMarkerMesh && tapMarkerMesh.visible) {
                tapMarkerMesh.scale.addScalar(dt * 2.0);
                tapMarkerMesh.material.opacity -= dt * 2.0;
                if (tapMarkerMesh.material.opacity <= 0) tapMarkerMesh.visible = false;
            }

            if (!isRunning && clock.getOldTime() === 0) {
                setTimeout(async () => {
                    const cloudAvatar = await loadAvatarFromCloud('current_user_id');
                    if (cloudAvatar) {
                        Object.keys(cloudAvatar).forEach(part => {
                            if (THEME[part] !== undefined) THEME[part] = cloudAvatar[part];
                        });
                    }
                    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    checkPointerLockNeeds();
                    const loader = document.getElementById('loading-screen');
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                    if (currentInputMode === 'mobile') document.getElementById('mobile-controls').style.display = 'block';
                    updateMovementModeUI();
                    isRunning = true;
                }, 2000);
            }

            renderer.render(scene, camera);
        }
        init();

        async function loadAvatarFromCloud(userId = 'default_user') {
            try {
                const response = await fetch(`https://roblox-devt.github.io/home/get-avatar?userId=${userId}`);
                if (!response.ok) throw new Error('Could not fetch avatar');
                const data = await response.json();
                return data.avatarState;
            } catch (error) {
                console.error("Cloud Fetch Error:", error);
                return null;
            }
        }
    </script>
</body>
</html>
